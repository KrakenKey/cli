version: 2

project_name: krakenkey

before:
  hooks:
    - go mod tidy

builds:
  - id: krakenkey
    main: ./cmd/krakenkey
    binary: krakenkey
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: krakenkey
    name_template: "krakenkey_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

dockers:
  - image_templates:
      - "ghcr.io/krakenkey/cli:{{ .Version }}-amd64"
      - "ghcr.io/krakenkey/cli:latest-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goos: linux
    goarch: amd64
  - image_templates:
      - "ghcr.io/krakenkey/cli:{{ .Version }}-arm64"
      - "ghcr.io/krakenkey/cli:latest-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/krakenkey/cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/krakenkey/cli:{{ .Version }}-amd64"
      - "ghcr.io/krakenkey/cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/krakenkey/cli:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/krakenkey/cli:{{ .Version }}-amd64"
      - "ghcr.io/krakenkey/cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/krakenkey/cli:{{ .Major }}"
    image_templates:
      - "ghcr.io/krakenkey/cli:{{ .Version }}-amd64"
      - "ghcr.io/krakenkey/cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/krakenkey/cli:latest"
    image_templates:
      - "ghcr.io/krakenkey/cli:latest-amd64"
      - "ghcr.io/krakenkey/cli:latest-arm64"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
