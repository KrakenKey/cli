version: 2

project_name: krakenkey

before:
  hooks:
    - go mod tidy

builds:
  - id: krakenkey
    main: ./cmd/krakenkey
    binary: krakenkey
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: krakenkey
    builds: [krakenkey]
    name_template: "krakenkey_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

dockers:
  - image_templates:
      - ghcr.io/krakenkey/cli:latest
      - ghcr.io/krakenkey/cli:{{ .Tag }}
      - ghcr.io/krakenkey/cli:v{{ .Major }}.{{ .Minor }}
      - ghcr.io/krakenkey/cli:v{{ .Major }}
    dockerfile: Dockerfile
    build_flag_templates:
      - --build-arg=VERSION={{.Version}}
    use: buildx
    goarch: amd64

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
